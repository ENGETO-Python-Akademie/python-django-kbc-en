# ENGETO Python/JS Bootcamp - Nuomy Course Outline
#
# Source: Client specification (3-hour lessons → 60-minute Nuomy courses)
# Total original lessons: 22
# Total Nuomy courses: 66 (22 × 3)
#
# Structure:
# - Each original 3-hour lesson is split into 3 logical 60-minute courses
# - Breakpoints are based on content flow, not mechanical splits
# - Level: beginner to intermediate
#
# =============================================================================

cases:
  # ===========================================================================
  # LESSON 1: Introduction to OOP in Python (Python, OOP)
  # Original content: introduction, motivation, class, instance, properties
  # ===========================================================================

  - caseId: engeto-oop-001-motivation
    context:
      level: beginner
      timeBudgetMinutes: 60
      preferences: [practical, hands-on]
      constraints: []
      parentLesson: "Introduction to OOP in Python"
      lessonNumber: 1
      partNumber: 1

    expectedScenario:
      mustHave:
        - "Learner role: Python developer starting with OOP"
        - "Context: transitioning from procedural programming to object-oriented"
        - "Concrete goal: understand why OOP exists and when to use it"
      mustAvoid:
        - "Too much abstraction without practical examples"
        - "Jumping straight into syntax without motivation"
        - "Comparing with other languages"
      golden:
        summary: |
          You're a Python developer who can write functions and procedural code.
          Now you want to learn OOP to write better organized and reusable code.

    expectedConcepts:
      mustHave:
        - "Why OOP was created - limits of procedural programming"
        - "Core idea - data and behavior together"
        - "When to use OOP and when not to"
        - "Real-world examples (games, applications, frameworks)"
      mustAvoid:
        - "Class definitions and syntax (comes in next course)"
        - "Advanced concepts (inheritance, polymorphism)"
        - "Academic definitions without context"
      golden:
        concepts:
          - name: "Limits of procedural code"
            description: "Why functions and global data aren't enough for larger projects."
          - name: "OOP as an organizational principle"
            description: "Core idea - combining data and operations into one unit."
          - name: "When OOP makes sense"
            description: "Practical situations where OOP solves real problems."
          - name: "OOP in the real world"
            description: "Examples from frameworks and libraries you use daily."

  - caseId: engeto-oop-002-classes
    context:
      level: beginner
      timeBudgetMinutes: 60
      preferences: [hands-on, practical]
      constraints: ["follows OOP motivation"]
      parentLesson: "Introduction to OOP in Python"
      lessonNumber: 1
      partNumber: 2

    expectedScenario:
      mustHave:
        - "Learner role: Python developer ready to write first class"
        - "Context: understands OOP motivation, now needs syntax"
        - "Concrete goal: define own class in Python"
      mustAvoid:
        - "Repeating motivation (already covered)"
        - "Instances and their creation (next course)"
        - "Advanced methods (__init__ details)"
      golden:
        summary: |
          You understand why OOP exists and now you'll learn how to define your own class in Python.
          The goal is to understand class syntax and basic structure.

    expectedConcepts:
      mustHave:
        - "Python class syntax"
        - "Class as template/blueprint"
        - "Basic class structure"
        - "Naming conventions (PascalCase)"
      mustAvoid:
        - "Creating instances (next course)"
        - "Inheritance and advanced concepts"
        - "Special methods except basic __init__"
      golden:
        concepts:
          - name: "Class syntax"
            description: "How to write first class - class keyword and structure."
          - name: "Class as blueprint"
            description: "Class defines structure, instances are concrete objects."
          - name: "Conventions and best practices"
            description: "Naming, code organization, Python style guide."
          - name: "Your first class"
            description: "Practical exercise - define a class for a real use case."

  - caseId: engeto-oop-003-instances
    context:
      level: beginner
      timeBudgetMinutes: 60
      preferences: [hands-on, practical]
      constraints: ["follows class definition"]
      parentLesson: "Introduction to OOP in Python"
      lessonNumber: 1
      partNumber: 3

    expectedScenario:
      mustHave:
        - "Learner role: developer who can define a class"
        - "Context: needs to create and use objects"
        - "Concrete goal: create instances and work with properties"
      mustAvoid:
        - "Repeating class definitions"
        - "Methods (except __init__)"
        - "Inheritance"
      golden:
        summary: |
          You can define a class and now you'll learn to create instances and work with their properties.
          The goal is to understand how objects live in memory and how to interact with them.

    expectedConcepts:
      mustHave:
        - "Creating instances (constructor)"
        - "__init__ method and self"
        - "Instance attributes vs class attributes"
        - "Accessing properties (dot notation)"
      mustAvoid:
        - "Methods except __init__"
        - "Inheritance and advanced concepts"
        - "Memory management details"
      golden:
        concepts:
          - name: "Creating instances"
            description: "How to create a concrete object from a class."
          - name: "__init__ and self"
            description: "Constructor and reference to current instance."
          - name: "Instance vs class attributes"
            description: "Difference between instance data and data shared by all instances."
          - name: "Working with objects"
            description: "Accessing properties, modification, object lifecycle."

  # ===========================================================================
  # LESSON 2: Attributes and Class Properties (Python, OOP)
  # Original content: method types, underscores and their function
  # ===========================================================================

  - caseId: engeto-oop-004-attributes
    context:
      level: beginner-intermediate
      timeBudgetMinutes: 60
      preferences: [practical, hands-on]
      constraints: ["knows OOP basics - classes and instances"]
      parentLesson: "Attributes and Class Properties"
      lessonNumber: 2
      partNumber: 1

    expectedScenario:
      mustHave:
        - "Learner role: developer with OOP basics"
        - "Context: needs to better organize data in classes"
        - "Concrete goal: understand attribute types and when to use each"
      mustAvoid:
        - "Class basics (already covered)"
        - "Methods (next course)"
        - "Inheritance"
      golden:
        summary: |
          You can create classes and instances. Now you'll learn how to properly organize
          attributes - when to use instance attribute, when class attribute, and how to protect them.

    expectedConcepts:
      mustHave:
        - "Instance attributes vs class attributes"
        - "Mutable vs immutable attributes"
        - "Property decorator basics"
        - "Getters and setters in Python"
      mustAvoid:
        - "Class methods"
        - "Underscores and conventions (next course)"
        - "Descriptors"
      golden:
        concepts:
          - name: "Attribute types"
            description: "Instance attributes, class attributes, and when to use each."
          - name: "Mutable default argument trap"
            description: "Common mistake with mutable default values and how to avoid it."
          - name: "Property decorator"
            description: "How to create controlled access to attributes."
          - name: "Getters and setters"
            description: "Pythonic way of validation and value transformation."

  - caseId: engeto-oop-005-methods
    context:
      level: beginner-intermediate
      timeBudgetMinutes: 60
      preferences: [hands-on, practical]
      constraints: ["knows attributes and property"]
      parentLesson: "Attributes and Class Properties"
      lessonNumber: 2
      partNumber: 2

    expectedScenario:
      mustHave:
        - "Learner role: developer expanding OOP knowledge"
        - "Context: needs to understand different method types"
        - "Concrete goal: properly use instance, class and static methods"
      mustAvoid:
        - "Method basics (self)"
        - "Abstract methods (will be with inheritance)"
        - "Magic methods except basics"
      golden:
        summary: |
          You know attributes and now you'll learn differences between method types.
          When to use regular method, when @classmethod and when @staticmethod.

    expectedConcepts:
      mustHave:
        - "Instance methods and self"
        - "@classmethod and cls"
        - "@staticmethod - when and why"
        - "Factory methods pattern"
      mustAvoid:
        - "Magic/dunder methods"
        - "Abstract methods"
        - "Method resolution order"
      golden:
        concepts:
          - name: "Instance methods"
            description: "Regular methods working with specific instance via self."
          - name: "@classmethod"
            description: "Methods working with class, not instance - factory pattern."
          - name: "@staticmethod"
            description: "Utility functions that logically belong to the class."
          - name: "When to use what"
            description: "Practical rules for choosing the right method type."

  - caseId: engeto-oop-006-underscores
    context:
      level: beginner-intermediate
      timeBudgetMinutes: 60
      preferences: [practical]
      constraints: ["knows method types and attributes"]
      parentLesson: "Attributes and Class Properties"
      lessonNumber: 2
      partNumber: 3

    expectedScenario:
      mustHave:
        - "Learner role: developer learning Python conventions"
        - "Context: needs to understand visibility and naming conventions"
        - "Concrete goal: properly use underscores and protect implementation"
      mustAvoid:
        - "Inheritance and MRO"
        - "All magic methods"
        - "Metaclasses"
      golden:
        summary: |
          You know methods and attributes. Now you'll learn Python visibility conventions -
          what underscores mean and how to properly mark private members.

    expectedConcepts:
      mustHave:
        - "Single underscore _name convention"
        - "Double underscore __name name mangling"
        - "Dunder methods __name__ basics"
        - "Public API vs implementation details"
      mustAvoid:
        - "Complete list of magic methods"
        - "Descriptors"
        - "Metaclasses"
      golden:
        concepts:
          - name: "Single underscore _name"
            description: "Convention for 'internal use' - what it means and how to respect it."
          - name: "Double underscore __name"
            description: "Name mangling - real protection against collisions."
          - name: "Dunder methods __name__"
            description: "Python special methods - __init__, __str__, __repr__."
          - name: "Public API design"
            description: "How to decide what to expose and what to hide."

  # ===========================================================================
  # LESSON 3: Inheritance and Abstraction (Python, OOP)
  # Original content: polymorphism, encapsulation, inheritance, abstraction
  # ===========================================================================

  - caseId: engeto-oop-007-inheritance
    context:
      level: intermediate
      timeBudgetMinutes: 60
      preferences: [practical, hands-on]
      constraints: ["knows classes, instances, methods, attributes"]
      parentLesson: "Inheritance and Abstraction"
      lessonNumber: 3
      partNumber: 1

    expectedScenario:
      mustHave:
        - "Learner role: OOP developer ready for advanced concepts"
        - "Context: needs to reuse and extend code"
        - "Concrete goal: implement inheritance and extend classes"
      mustAvoid:
        - "OOP basics (already covered)"
        - "Multiple inheritance details"
        - "Metaclasses"
      golden:
        summary: |
          You can create classes and now you'll learn to extend them using inheritance.
          The goal is to understand when and how to inherit, and avoid common pitfalls.

    expectedConcepts:
      mustHave:
        - "Python inheritance basics"
        - "super() and calling parent methods"
        - "Method overriding"
        - "When to inherit and when not (composition vs inheritance)"
      mustAvoid:
        - "Multiple inheritance (briefly)"
        - "MRO details"
        - "Abstract classes (next course)"
      golden:
        concepts:
          - name: "Inheritance basics"
            description: "How one class extends another - syntax and concept."
          - name: "super() and parent"
            description: "Calling parent class methods correctly."
          - name: "Method override"
            description: "Overriding behavior in child classes."
          - name: "Composition vs inheritance"
            description: "When to inherit and when to compose objects instead."

  - caseId: engeto-oop-008-polymorphism
    context:
      level: intermediate
      timeBudgetMinutes: 60
      preferences: [practical]
      constraints: ["knows inheritance"]
      parentLesson: "Inheritance and Abstraction"
      lessonNumber: 3
      partNumber: 2

    expectedScenario:
      mustHave:
        - "Learner role: developer working with class hierarchies"
        - "Context: needs flexible and extensible code"
        - "Concrete goal: understand polymorphism and encapsulation in practice"
      mustAvoid:
        - "Inheritance basics (covered)"
        - "Abstract classes (next course)"
        - "Type hints and protocols"
      golden:
        summary: |
          You can inherit classes and now you'll learn to leverage polymorphism -
          how to write code that works with different object types uniformly.

    expectedConcepts:
      mustHave:
        - "Polymorphism - same interface, different implementations"
        - "Duck typing in Python"
        - "Encapsulation - hiding implementation"
        - "Practical polymorphism examples"
      mustAvoid:
        - "Abstract base classes (next course)"
        - "Protocols and structural subtyping"
        - "Multiple dispatch"
      golden:
        concepts:
          - name: "What is polymorphism"
            description: "One interface, many implementations - core idea."
          - name: "Duck typing"
            description: "Pythonic approach - what matters is what object can do, not what it is."
          - name: "Encapsulation in practice"
            description: "How and why to hide implementation details."
          - name: "Polymorphism in real code"
            description: "Examples from frameworks and libraries."

  - caseId: engeto-oop-009-abstraction
    context:
      level: intermediate
      timeBudgetMinutes: 60
      preferences: [practical, hands-on]
      constraints: ["knows inheritance and polymorphism"]
      parentLesson: "Inheritance and Abstraction"
      lessonNumber: 3
      partNumber: 3

    expectedScenario:
      mustHave:
        - "Learner role: OOP developer defining contracts"
        - "Context: needs to enforce implementation in child classes"
        - "Concrete goal: use ABC and abstract methods"
      mustAvoid:
        - "Inheritance basics (covered)"
        - "Metaclasses"
        - "Protocols (typing module)"
      golden:
        summary: |
          You understand polymorphism and now you'll learn to define abstract classes -
          how to enforce that child classes must implement certain methods.

    expectedConcepts:
      mustHave:
        - "ABC module and abstract classes"
        - "@abstractmethod decorator"
        - "When to use abstract class"
        - "Interface pattern in Python"
      mustAvoid:
        - "Protocols (typing.Protocol)"
        - "Metaclasses and __new__"
        - "Multiple inheritance anti-patterns"
      golden:
        concepts:
          - name: "Abstract classes"
            description: "Classes that cannot be instantiated - they define contracts."
          - name: "ABC module"
            description: "Python standard library for abstract base classes."
          - name: "@abstractmethod"
            description: "How to enforce method implementation in child classes."
          - name: "Interface pattern"
            description: "When and how to define pure interfaces in Python."

  # ===========================================================================
