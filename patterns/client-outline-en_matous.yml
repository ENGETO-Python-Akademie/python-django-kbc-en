        - "Encryption"
        - "Config management systems"
      golden:
        concepts:
          - name: "Environment variables basics"
            description: "What they are and why to use them for configuration."
          - name: "Reading env variables in Python"
            description: "os.environ, os.getenv, and best practices."
          - name: ".env files"
            description: "Local configuration with python-dotenv."
          - name: "Security and secrets"
            description: "What never to commit and how to protect sensitive data."

  - caseId: engeto-tooling-003-pip-uv
    context:
