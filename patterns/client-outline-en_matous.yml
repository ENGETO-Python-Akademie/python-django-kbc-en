    expectedConcepts:
      mustHave:
        - "Why isolate environments"
        - "venv vs virtualenv"
        - "Creating and activating environments"
        - "Basic workflow with virtual environments"
      mustAvoid:
        - "Conda (out of scope)"
        - "Poetry, uv (later courses)"
        - "CI/CD integration"
      golden:
        concepts:
          - name: "Why virtual environments"
            description: "Problems with global installation and how virtual environments solve them."
          - name: "venv - standard library solution"
            description: "How to create environment using python -m venv."
          - name: "Activation and deactivation"
            description: "Switching between environments on different OS."
          - name: "Best practices"
